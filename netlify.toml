[build]
  publish = "build"
  command = "mkdir -p netlify/functions && cp 1_sem_espec/functions/search-01.js 2_PRD/functions/search-02.js netlify/functions/ && cp 1_sem_espec/functions/package.json netlify/functions/ && npm --prefix netlify/functions install && mkdir -p build/01-sem-espec && cp 1_sem_espec/index.html 1_sem_espec/style.css 1_sem_espec/app.js build/01-sem-espec/ && mkdir -p build/2_PRD && cp 2_PRD/index.html 2_PRD/style.css 2_PRD/app.js build/2_PRD/"

# --- 01-sem-espec ---
[[redirects]]
  from   = "/01-sem-espec/api/search"
  to     = "/.netlify/functions/search-01"
  status = 200

# --- 02-prd ---
[[redirects]]
  from   = "/2_PRD/api/search"
  to     = "/.netlify/functions/search-02"
  status = 200

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, OPTIONS"
