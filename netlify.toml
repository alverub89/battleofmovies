[build]
  publish = "build"
  functions = "netlify/functions"
  command = "mkdir -p build/01-sem-espec && cp 1_sem_espec/index.html 1_sem_espec/style.css 1_sem_espec/app.js build/01-sem-espec/"

# --- 01-sem-espec ---
[[redirects]]
  from   = "/01-sem-espec/api/search"
  to     = "/.netlify/functions/search-01"
  status = 200

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, OPTIONS"
