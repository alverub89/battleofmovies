<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battle of Movies — Busca Inteligente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">

    <!-- Header -->
    <header class="site-header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">🎬</span>
          <span class="logo-text">Battle of Movies</span>
          <span class="logo-badge">BDD</span>
        </div>
        <p class="tagline">Descreva o filme que você quer assistir</p>
      </div>
    </header>

    <!-- Search -->
    <section class="search-section">
      <form id="searchForm" class="search-form" autocomplete="off">
        <div class="search-wrap">
          <input
            id="searchInput"
            type="text"
            class="search-input"
            placeholder="Ex: filmes de terror dos anos 80..."
            spellcheck="false"
          />
          <button type="submit" class="search-btn" aria-label="Buscar">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          </button>
        </div>
      </form>

      <div class="suggestions" id="suggestions">
        <button class="chip" data-q="filmes de terror dos anos 80">Terror anos 80</button>
        <button class="chip" data-q="comédia romântica">Comédia romântica</button>
        <button class="chip" data-q="ficção científica com robô">Ficção científica</button>
        <button class="chip" data-q="drama familiar">Drama familiar</button>
        <button class="chip" data-q="faroeste com mocinho e bandido">Faroeste</button>
        <button class="chip" data-q="filme para chorar com final triste">Para chorar</button>
      </div>
    </section>

    <!-- Main content -->
    <main class="content" id="content">

      <!-- Loading -->
      <div id="loading" class="loading hidden" aria-live="polite">
        <div class="spinner"></div>
        <span>Buscando filmes…</span>
      </div>

      <!-- Error -->
      <div id="errorBox" class="error-box hidden" role="alert"></div>

      <!-- Results section -->
      <section id="resultsSection" class="results-section hidden" aria-live="polite">

        <div class="results-meta">
          <p id="resultsHeader" class="results-header"></p>
          <div id="confidenceAlert" class="confidence-alert hidden" role="status">
            <span class="alert-icon">⚠️</span>
            <span id="confidenceMsg"></span>
          </div>
        </div>

        <ul id="resultsList" class="results-list" role="list"></ul>

        <nav id="pagination" class="pagination hidden" aria-label="Paginação">
          <button id="btnPrev" class="page-btn" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            Anterior
          </button>
          <span id="pageInfo" class="page-info"></span>
          <button id="btnNext" class="page-btn" disabled>
            Próxima
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </nav>

      </section>

      <!-- Empty state (initial) -->
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">🍿</div>
        <p>Digite o que você quer assistir e encontre o filme certo.</p>
        <p class="empty-hint">Funciona com gênero, década, humor, referências vagas e muito mais.</p>
      </div>

    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
